name: manta
channels:
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.9.*
  - pip
  - pip:
    - --find-links https://download.pytorch.org/whl/cu121/torch_stable.html
    - torch==2.1.2
    - torchvision==0.16.2
    - torchaudio==2.1.2
    - pandas
    - numpy==1.24.3
    - einops
    - scikit-learn
    - opencv-python
    - matplotlib 
    - tensorboard
    - tqdm
    - simplejson
    - yacs
    - lmdb
    - mmengine
    - joblib
    - ninja